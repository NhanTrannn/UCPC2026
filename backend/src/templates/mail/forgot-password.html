<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCPC Password Reset</title>
</head>

<body style="margin:0;padding:24px;background:#0f172a;font-family:Arial,sans-serif;color:#e2e8f0;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
    style="max-width:640px;margin:0 auto;background:#111827;border:1px solid #1f2937;border-radius:12px;overflow:hidden;">
    <tr>
      <td style="padding:20px 24px;background:#0b1220;border-bottom:1px solid #1f2937;">
        <h1 style="margin:0;font-size:20px;color:#93c5fd;">UCPC 2026</h1>
      </td>
    </tr>
    <tr>
      <td style="padding:24px;line-height:1.6;">
        <h2 style="margin:0 0 12px 0;color:#f8fafc;font-size:18px;">Password reset request</h2>
        <p style="margin:0 0 10px 0;">Use this PIN to reset your password:</p>
        <p style="margin:0 0 14px 0;font-size:24px;font-weight:700;color:#86efac;letter-spacing:2px;">{{PIN}}</p>
        <p style="margin:0;color:#cbd5e1;">If you did not request this, you can ignore this email.</p>
      </td>
    </tr>
  </table>
</body>

</html>
